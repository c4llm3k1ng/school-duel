  {question:"Welche Farben trägt die deutsche Fußball-Nationalmannschaft traditionell?",options:["Rot-Schwarz","Weiß-Schwarz","Blau-Gold","Grün-Weiß"],correct:1,explanation:"Deutschland spielt traditionell in weißen Trikots mit schwarzen Hosen, daher der Spitzname 'Die Weißen'.",topic:"Nationalmannschaften"},
  {question:"Wer erzielte das Siegtor für Deutschland im WM-Finale 2014 gegen Argentinien?",options:["Miroslav Klose","Thomas Müller","Bastian Schweinsteiger","Mario Götze"],correct:3,explanation:"Mario Götze traf in der 113. Minute der Verlängerung zum 1:0-Endstand und wurde damit zum deutschen WM-Helden.",topic:"Weltmeisterschaft"},

  {question:"Was ist der Ballon d'Or?",options:["Der Pokal für den Bundesliga-Meister","Der WM-Pokal","Die Auszeichnung für den besten Fußballer der Welt","Der Preis für den besten Torwart"],correct:2,explanation:"Der Ballon d'Or (Goldener Ball) ist die renommierteste Einzelauszeichnung im Fußball und wird jährlich vergeben.",topic:"Auszeichnungen"},
  {question:"Was ist 'VAR' im modernen Fußball?",options:["Verlängerungs-Assistent-Regelung","Video-Assistent-Referee","Vereins-Ausgleichs-Regel","Verteidiger-Angriffs-Rotation"],correct:1,explanation:"Der VAR (Video Assistant Referee) hilft dem Schiedsrichter, strittige Entscheidungen anhand von Videoaufnahmen zu überprüfen.",topic:"Technik"},
  {question:"In welchem Bundesland liegt der FC Bayern München?",options:["Baden-Württemberg","Nordrhein-Westfalen","Bayern","Hessen"],correct:2,explanation:"Der FC Bayern München ist in der bayerischen Landeshauptstadt München beheimatet.",topic:"Bundesliga"},
  {question:"Was ist der Strafraum?",options:["Der Bereich vor dem Tor, in dem Fouls zu Elfmetern führen","Der Bereich hinter dem Mittelkreis","Die Zone für Freistöße","Das gesamte Spielfeld minus Mittelstreifen"],correct:0,explanation:"Im Strafraum (18-Meter-Raum) führen Fouls gegen einen Angreifer zum Elfmeter. Auch der Torwart darf nur hier den Ball mit der Hand aufnehmen.",topic:"Grundregeln"},
  {question:"Wie viele Ballon-d'Or-Auszeichnungen hat Lionel Messi gewonnen?",options:["5","6","7","8"],correct:3,explanation:"Lionel Messi gewann den Ballon d'Or bereits achtmal und ist damit der Rekordhalter dieser Auszeichnung.",topic:"Auszeichnungen"},
  {question:"Wer ist der Rekordtorschütze in der Geschichte der FIFA-Weltmeisterschaften?",options:["Kylian Mbappé","Ronaldo (Brasilien)","Pelé","Gerd Müller"],correct:0,explanation:"Kylian Mbappé erzielte insgesamt 22 WM-Tore und ist damit WM-Rekordtorschütze aller Zeiten.",topic:"Rekorde"},
  {question:"Wie nennt man das Derby zwischen Borussia Dortmund und dem FC Schalke 04?",options:["Klassiker","Revierderby","Ruhrpott-Kracher","Westdeutsches Derby"],correct:1,explanation:"Das 'Revierderby' zwischen BVB und Schalke ist eines der leidenschaftlichsten Stadtduelle Deutschlands.",topic:"Bundesliga"},
  {question:"Was kennzeichnet den 'Libero' in einer Fußballmannschaft?",options:["Ein freier Stürmer ohne feste Position","Ein freier Abwehrspieler, der hinter der Kette agiert und das Spiel aufbaut","Ein Mittelfeldspieler mit Doppelaufgabe","Ein aufrückender Torhüter"],correct:1,explanation:"Der Libero ist ein freier Abwehrspieler, der das Spiel ordnet und aufbaut. Franz Beckenbauer prägte diese Rolle.",topic:"Spielsysteme"},
  {question:"Wie nennt man die zweite höchste Spielklasse im deutschen Fußball?",options:["2. Bundesliga","Regionalliga","Oberliga","Zweite Liga"],correct:0,explanation:"Die 2. Bundesliga ist die direkt unterhalb der Bundesliga angesiedelte Spielklasse in Deutschland.",topic:"Bundesliga"},
  {question:"In welchem Jahr wurde die Fußball-Bundesliga gegründet?",options:["1954","1963","1972","1980"],correct:1,explanation:"Die Fußball-Bundesliga wurde 1963 als erste einheitliche nationale Profiliga in Deutschland gegründet.",topic:"Bundesliga"},
  {question:"Welches ist die älteste noch existierende Fußball-Liga der Welt?",options:["Bundesliga","Serie A","Football League (England)","Primera División"],correct:2,explanation:"Die Football League in England wurde 1888 gegründet und ist damit die älteste professionelle Fußball-Liga der Welt.",topic:"Geschichte"},
  {question:"In welchem Jahr gewann Deutschland zum ersten Mal die Fußball-Weltmeisterschaft?",options:["1950","1954","1958","1966"],correct:1,explanation:"Deutschland gewann 1954 in der Schweiz das Finale gegen Ungarn mit 3:2 – das sogenannte 'Wunder von Bern'.",topic:"Weltmeisterschaft"},
  {question:"Wer war der Kapitän der deutschen Nationalmannschaft bei der WM 2014?",options:["Oliver Kahn","Michael Ballack","Philipp Lahm","Bastian Schweinsteiger"],correct:2,explanation:"Philipp Lahm führte die deutsche Nationalmannschaft als Kapitän beim WM-Triumph 2014 in Brasilien.",topic:"Deutsche Spieler"},
  {question:"Welcher deutsche Stürmer wurde bei der WM 2006 Torschützenkönig?",options:["Miroslav Klose","Lukas Podolski","Oliver Neuville","Bernd Schneider"],correct:0,explanation:"Miroslav Klose erzielte bei der Heim-WM 2006 fünf Tore und wurde damit Torschützenkönig des Turniers.",topic:"Deutsche Spieler"},
  {question:"Für welchen Verein spielte Franz Beckenbauer den Großteil seiner Karriere?",options:["Borussia Dortmund","Hamburger SV","FC Bayern München","Werder Bremen"],correct:2,explanation:"Franz Beckenbauer verbrachte die meiste seiner Karriere beim FC Bayern München, für den er von 1964 bis 1977 spielte.",topic:"Deutsche Spieler"},
  {question:"Wie wird die Spielposition des Torwarts im Fußball auch bezeichnet?",options:["Keeper","Goalie","Schlussmann","Alle Antworten sind korrekt"],correct:3,explanation:"Torwart, Keeper, Goalie und Schlussmann sind alles gebräuchliche Bezeichnungen für die Torhüterposition.",topic:"Fachbegriffe"},
  {question:"Was ist eine 'Flanke' im Fußball?",options:["Ein flacher Pass durch die Mitte","Ein hoher Querball von der Seite in den Strafraum","Ein Schuss aus der Drehung","Ein weiter Abschlag des Torwarts"],correct:1,explanation:"Eine Flanke ist ein gezielter Querball von der Außenposition in den Strafraum, meistens als Vorlage für einen Kopfball.",topic:"Fachbegriffe"},
  {question:"Wer hat die meisten Länderspiele für die deutsche Nationalmannschaft absolviert?",options:["Franz Beckenbauer","Lothar Matthäus","Sepp Maier","Miroslav Klose"],correct:1,explanation:"Lothar Matthäus bestritt 150 Länderspiele für Deutschland und ist damit Rekordnationalspieler.",topic:"Rekorde"},

  {question:"Welcher Verein gewann in der Saison 2019/20 die Bundesliga?",options:["Borussia Dortmund","RB Leipzig","FC Bayern München","Bayer Leverkusen"],correct:2,explanation:"Der FC Bayern München holte 2019/20 die Meisterschaft und gewann im gleichen Jahr auch die Champions League.",topic:"Bundesliga"},
  {question:"Wo wurde die Fußball-Weltmeisterschaft 2006 ausgetragen?",options:["Frankreich","England","Deutschland","Spanien"],correct:2,explanation:"Deutschland war 2006 Gastgeber der Weltmeisterschaft. Das Sommermärchen endete für die DFB-Elf mit dem dritten Platz.",topic:"Weltmeisterschaft"},
  {question:"Was ist ein 'Kopfball'?",options:["Ein Schuss mit der Ferse","Ein Tor nach einem Eckball","Ein Ball, der mit dem Kopf gespielt wird","Ein langer Abschlag des Torwarts"],correct:2,explanation:"Ein Kopfball wird gespielt, indem ein Spieler den Ball mit dem Kopf trifft – beim Angriff als Torabschluss oder zur Weiterleitung.",topic:"Fachbegriffe"},
  {question:"Welche Nationalmannschaft trägt den Beinamen 'Die Mannschaft' offiziell?",options:["Österreich","Schweiz","Deutschland","Niederlande"],correct:2,explanation:"Die deutsche Fußball-Nationalmannschaft wurde offiziell unter dem Namen 'Die Mannschaft' vermarktet.",topic:"Nationalmannschaften"},
  {question:"Was ist eine 'Standfußgräme' oder ein 'Tackling'?",options:["Ein Schuss mit dem Standbein","Ein Versuch, dem Gegner den Ball mit dem Bein abzunehmen","Ein Abspielen auf den Mitspieler","Ein Freistoß nach Foulspiel"],correct:1,explanation:"Ein Tackling ist der Versuch eines Spielers, dem Gegner durch gezielten Einsatz des Beins den Ball abzunehmen.",topic:"Fachbegriffe"},
  {question:"Aus welchem Land stammt der Spieler Pelé?",options:["Argentinien","Portugal","Uruguay","Brasilien"],correct:3,explanation:"Pelé wurde in Brasilien geboren und gilt als einer der besten Fußballer aller Zeiten. Mit Brasilien gewann er dreimal die Weltmeisterschaft.",topic:"Spieler"},
  {question:"Welche WM hat Diego Maradona mit Argentinien gewonnen?",options:["1978","1982","1986","1990"],correct:2,explanation:"Diego Maradona führte Argentinien 1986 in Mexiko zum WM-Titel und erzielte dabei einige der berühmtesten Tore der Geschichte.",topic:"Spieler"},
  {question:"Für welches Land spielt Cristiano Ronaldo Fußball?",options:["Brasilien","Spanien","Portugal","Italien"],correct:2,explanation:"Cristiano Ronaldo ist seit Jahrzehnten der Superstar der portugiesischen Nationalmannschaft und einer der Topscorer aller Zeiten.",topic:"Spieler"},
  {question:"In welchem Land wird die 'Premier League' gespielt?",options:["Spanien","Frankreich","Deutschland","England"],correct:3,explanation:"Die Premier League ist die höchste Fußballliga Englands und gilt als eine der bekanntesten Ligen weltweit.",topic:"Ligen"},
  {question:"Was bezeichnet man als 'Offside' oder 'Abseits'?",options:["Ein Foulspiel im Strafraum","Die Position eines Angreifers hinter der Abwehrlinie beim Zuspiel","Ein Ball, der das Spielfeld verlässt","Ein Vergehen des Torwarts"],correct:1,explanation:"Abseits liegt vor, wenn ein Angreifer beim Zuspiel näher an der gegnerischen Torlinie steht als der vorletzte Gegner.",topic:"Grundregeln"},
  {question:"Wie heißt der Wettbewerb, bei dem Vereinsmannschaften aus ganz Europa um den zweitwichtigsten Titel kämpfen?",options:["UEFA Nations League","UEFA Europa League","UEFA Conference League","Intertoto Cup"],correct:1,explanation:"Die UEFA Europa League ist nach der Champions League der bedeutendste europäische Vereinswettbewerb.",topic:"Wettbewerbe"},
  {question:"Wer gewann die erste Weltmeisterschaft im Jahr 1930?",options:["Argentinien","Brasilien","Uruguay","Italien"],correct:2,explanation:"Uruguay gewann die allererste Weltmeisterschaft 1930 im eigenen Land und besiegte im Finale Argentinien mit 4:2.",topic:"Geschichte"},
  {question:"Was ist ein 'Eckball'?",options:["Ein Einwurf von der Ecklinie","Ein Freistoß von der Ecke des Strafraums","Ein Schuss vom Eckpunkt des Spielfelds, wenn der Ball von einem Verteidiger ins Aus gegangen ist","Ein Strafstoß nach Abseits"],correct:2,explanation:"Ein Eckball wird vom Eckpunkt ausgeführt, wenn der Ball von der verteidigenden Mannschaft über die Torlinie gespielt wurde.",topic:"Grundregeln"},
  {question:"In welcher Stadt befindet sich das Bernabéu-Stadion von Real Madrid?",options:["Barcelona","Bilbao","Sevilla","Madrid"],correct:3,explanation:"Das Santiago-Bernabéu-Stadion liegt in der spanischen Hauptstadt Madrid und ist das Heimstadion von Real Madrid.",topic:"Stadien"},
  {question:"Welches englische Traditionsstadion trägt den Spitznamen 'Theater der Träume'?",options:["Anfield Road","Stamford Bridge","Old Trafford","Emirates Stadium"],correct:2,explanation:"Old Trafford in Manchester ist die Heimstätte von Manchester United und wird als 'Theatre of Dreams' bezeichnet.",topic:"Stadien"},
  {question:"Welche Position spielt ein Spieler, der das Spiel aus der Tiefe lenkt und Tore vorbereitet?",options:["Stürmer","Torwart","Spielmacher","Innenverteidiger"],correct:2,explanation:"Der Spielmacher (auch 'Zehner') ist dafür zuständig, Torchancen zu kreieren und das Spiel zu verteilen.",topic:"Spielsysteme"},
  {question:"Wie nennt man den Moment, wenn eine Mannschaft in der Schlussphase noch ausgleicht oder gewinnt?",options:["Aufholjagd","Comeback","Tor in der Nachspielzeit","Alle Bezeichnungen sind gebräuchlich"],correct:3,explanation:"Spät erzielte Tore werden oft als 'Comeback', 'Aufholjagd' oder 'Tor in letzter Sekunde' bezeichnet.",topic:"Fachbegriffe"},
  {question:"Welcher Verein gilt als der Erzrivale des FC Bayern München in der Bundesliga?",options:["Bayer Leverkusen","VfB Stuttgart","Borussia Dortmund","Hamburger SV"],correct:2,explanation:"Das Duell zwischen dem FC Bayern München und Borussia Dortmund wird oft als 'Der Klassiker' bezeichnet.",topic:"Bundesliga"},
  {question:"Wie oft darf ein Team in einem Pflichtspiel (Bundesliga) pro Spiel auswechseln?",options:["Dreimal","Fünfmal","Siebenmal","Unbegrenzt"],correct:1,explanation:"In der Bundesliga dürfen Teams fünf Auswechslungen pro Spiel vornehmen – eine Regelung, die seit 2020 gilt.",topic:"Grundregeln"},
  {question:"Welches Land gewann die erste Europameisterschaft im Jahr 1960?",options:["Deutschland","Spanien","Sowjetunion","Frankreich"],correct:2,explanation:"Die Sowjetunion gewann 1960 in Frankreich die erste Fußball-Europameisterschaft durch einen 2:1-Sieg im Finale gegen Jugoslawien.",topic:"Geschichte"},
  {question:"Wofür steht die Abkürzung 'BVB' beim Verein aus Dortmund?",options:["Ballverein Vereinigung Bochum","Ballspielverein Borussia","Bonner Verein Bundesliga","Berliner Vereins-Bund"],correct:1,explanation:"BVB steht für 'Ballspielverein Borussia 09 e.V. Dortmund', gegründet am 19. Dezember 1909.",topic:"Vereine"},
  {question:"Welcher Spieler erhielt bei der WM 1986 zwei der berühmtesten Tore der Geschichte?",options:["Pelé","Zinedine Zidane","Diego Maradona","Michel Platini"],correct:2,explanation:"Diego Maradona erzielte bei der WM 1986 gegen England sowohl das 'Tor des Jahrhunderts' (Dribbling) als auch das berüchtigte 'Hand Gottes'-Tor.",topic:"Geschichte"},
  {question:"Was ist ein 'Freistoß'?",options:["Ein ungehinderter Schuss ohne Gegner","Ein Schuss nach einer Regelübertretung, den die bestrafte Mannschaft nicht stören darf","Ein Schuss aus dem Halbfeld","Ein Tor ohne Abseitsregel"],correct:1,explanation:"Ein Freistoß wird nach einer Regelübertretung ausgeführt. Die Gegner müssen mindestens 9,15 Meter Abstand halten.",topic:"Grundregeln"},
  {question:"Wer ist der Rekordtorschütze des FC Bayern München in der Bundesliga?",options:["Robert Lewandowski","Thomas Müller","Gerd Müller","Karl-Heinz Rummenigge"],correct:2,explanation:"Gerd Müller schoss für den FC Bayern 365 Bundesligatreffer und ist Rekordtorjäger des Vereins und der gesamten Liga.",topic:"Rekorde"},

  {question:"Was ist ein 'Nachschuss'?",options:["Ein zweiter Schuss nach einem abgewehrten Ball","Ein Schuss nach Ablauf der regulären Spielzeit","Ein Elfmeter","Ein Freistoß aus kurzer Entfernung"],correct:0,explanation:"Ein Nachschuss ist ein Schuss auf den abgewehrten oder vom Torwart nicht gehaltenen Ball, um doch noch ein Tor zu erzielen.",topic:"Fachbegriffe"},

  {question:"Welches afrikanische Land hat als erstes ein WM-Viertelfinale erreicht?",options:["Nigeria","Kamerun","Ägypten","Senegal"],correct:1,explanation:"Kamerun erreichte 1990 in Italien als erstes afrikanisches Land das WM-Viertelfinale, nach Siegen über Argentinien und Kolumbien.",topic:"Geschichte"},
  {question:"Was ist ein 'Einwurf'?",options:["Ein Anstoß nach einem Tor","Ein Schuss auf das Tor von der Seite","Das Wiedereinbringen des Balls, wenn er seitlich das Spielfeld verlassen hat","Ein Pass in den freien Raum"],correct:2,explanation:"Ein Einwurf wird ausgeführt, wenn der Ball über eine Seitenlinie das Spielfeld verlassen hat. Dabei muss der Ball mit beiden Händen über den Kopf geworfen werden.",topic:"Grundregeln"},

  {question:"Welcher Klub gewann als erster englischer Verein zweimal in Folge die Champions League?",options:["Arsenal","Manchester United","Liverpool","Nottingham Forest"],correct:3,explanation:"Nottingham Forest gewann 1979 und 1980 den Europapokal der Landesmeister (Vorgänger der CL) als erstem englischen Club zweimal hintereinander.",topic:"Geschichte"},

  {question:"Wer war der erste Brasilianer, der den Ballon d'Or gewann?",options:["Pelé","Ronaldinho","Ronaldo Nazário","Rivaldo"],correct:2,explanation:"Ronaldo Nazário gewann 1997 und 2002 den Weltfußballer-Titel (FIFA) und den Ballon d'Or – als einer der ersten Brasilianer.",topic:"Auszeichnungen"},
  {question:"Wer erzielte im WM-Finale 2022 drei Tore für Frankreich und setzte damit einen historischen Rekord?",options:["Antoine Griezmann","Olivier Giroud","Kylian Mbappé","Karim Benzema"],correct:2,explanation:"Kylian Mbappé erzielte im Finale gegen Argentinien drei Tore, verlor aber mit Frankreich trotzdem 3:4 im Elfmeterschießen.",topic:"Weltmeisterschaft"},
  {question:"Welcher Trainer gewann mit dem FC Barcelona den ersten Triple in der Geschichte des Clubs?",options:["Louis van Gaal","Johan Cruyff","Frank Rijkaard","Pep Guardiola"],correct:3,explanation:"Pep Guardiola führte den FC Barcelona 2009 zum ersten Triple (La Liga, Copa del Rey, Champions League) in der Vereinsgeschichte.",topic:"Trainer"},
  {question:"Welche Mannschaft verlor das WM-Finale 1950 im Maracanã trotz Favoriten-Stellung?",options:["Argentinien","Brasilien","Uruguay","Chile"],correct:1,explanation:"Im sogenannten 'Maracanazo' verlor Brasilien das entscheidende Spiel 1950 gegen Uruguay mit 1:2 – eine der größten Überraschungen der WM-Geschichte.",topic:"Geschichte"},
  {question:"Welcher deutsche Spieler wurde bei der WM 2010 mit dem Goldenen Schuh als Torschützenkönig ausgezeichnet?",options:["Miroslav Klose","Thomas Müller","Lukas Podolski","Michael Ballack"],correct:1,explanation:"Thomas Müller erzielte bei der WM 2010 fünf Tore und fünf Vorlagen und wurde damit Torschützenkönig und bester Nachwuchsspieler.",topic:"Deutsche Spieler"},
  {question:"Welcher Verein gewann die erste Ausgabe der Champions League in ihrer heutigen Form im Jahr 1993?",options:["AC Mailand","Ajax Amsterdam","Marseille","Barcelona"],correct:2,explanation:"Olympique Marseille gewann 1993 das erste Finale der neu formierten Champions League gegen AC Mailand mit 1:0. Allerdings wurden dem Club später wegen Bestechung die Trophäe aberkannt – formell blieb sie aber in der Statistik.",topic:"Champions League"},
  {question:"Wer ist der Rekordtorschütze in der Geschichte der Champions League?",options:["Raúl","Lionel Messi","Robert Lewandowski","Cristiano Ronaldo"],correct:3,explanation:"Cristiano Ronaldo ist mit über 140 Toren der Rekordtorschütze in der Geschichte der Champions League.",topic:"Rekorde"},

  {question:"Was bedeutet 'Pressing' im modernen Fußball?",options:["Eine defensive Grundordnung mit tiefer Stellung","Aktives Stören des Gegners mit und ohne Ball im gegnerischen Aufbau","Eine offensive Variante des Zonendeckens","Ein Spielsystem mit drei Stürmern"],correct:1,explanation:"Pressing bezeichnet das aktive, frühzeitige Anlaufen des ballführenden Gegners, um Fehler zu provozieren und den Ball früh zurückzugewinnen.",topic:"Spielsysteme"},
  {question:"Welcher Trainer entwickelte das sogenannte 'Total Football'-System?",options:["Pep Guardiola","Rinus Michels","Johan Cruyff","Louis van Gaal"],correct:1,explanation:"Rinus Michels entwickelte in den 1970er Jahren mit Ajax Amsterdam und der niederländischen Nationalmannschaft den revolutionären Spielstil des 'Totaal Voetbal'.",topic:"Trainer"},
  {question:"Wie viele Weltmeisterschaften hat Argentinien gewonnen?",options:["1","2","3","4"],correct:2,explanation:"Argentinien gewann die WM dreimal: 1978, 1986 (mit Maradona) und 2022 (mit Messi).",topic:"Weltmeisterschaft"},
  {question:"Welcher Spieler erzielte bei der WM 1958 in Schweden mit nur 17 Jahren als jüngster Torschütze ein Finale-Tor?",options:["Ronaldinho","Garrincha","Eusébio","Pelé"],correct:3,explanation:"Pelé wurde 1958 mit 17 Jahren und 249 Tagen zum jüngsten WM-Torschützen in einem Endspiel und erzielte zwei Tore beim 5:2-Sieg über Schweden.",topic:"Geschichte"},
  {question:"Wer war der erste Spieler, dem das sogenannte 'Phantom-Tor' zuerkannt wurde – ein Ball, der nicht die Linie überschritt?",options:["Thomas Müller bei der WM 2010","Frank Lampard bei der WM 2010","Thierry Henry gegen Irland","Geoff Hurst im WM-Finale 1966"],correct:1,explanation:"Frank Lampards Schuss im WM-Achtelfinale 2010 überquerte eindeutig die Linie, wurde aber nicht gegeben – was später zur Einführung der Torlinientechnologie beitrug.",topic:"Geschichte"},

  {question:"Wie nennt man das WM-Aus Deutschlands gegen Südkorea bei der WM 2002?",options:["Das Debakel von Gwangju","Das Wunder von Seoul","Das Drama von Ulsan","Es gibt keinen eigenen Namen"],correct:0,explanation:"Deutschland scheiterte 2002 im Halbfinale gegen Südkorea mit 0:1 in Gwangju – in einem bis heute umstrittenen Spiel.",topic:"Weltmeisterschaft"},

  {question:"Welcher Spieler ist der jüngste Torschütze in der Bundesliga-Geschichte?",options:["Youssoufa Moukoko","Jamal Musiala","Nuri Şahin","Timo Werner"],correct:0,explanation:"Youssoufa Moukoko von Borussia Dortmund schoss sein erstes Bundesligator im Alter von 16 Jahren und 28 Tagen und ist damit jüngster Torschütze der Liga.",topic:"Rekorde"},
  {question:"Welches Land gewann die WM 1998 zum ersten Mal?",options:["Deutschland","Portugal","Frankreich","Brasilien"],correct:2,explanation:"Frankreich gewann 1998 im eigenen Land erstmals die Weltmeisterschaft – mit 3:0 gegen Brasilien im Finale im Stade de France.",topic:"Weltmeisterschaft"},

  {question:"In welcher Stadt befindet sich das Camp Nou, das Stadion des FC Barcelona?",options:["Madrid","Valencia","Bilbao","Barcelona"],correct:3,explanation:"Das Camp Nou liegt in Barcelona und war mit fast 100.000 Plätzen lange Zeit das größte Fußballstadion Europas.",topic:"Stadien"},

  {question:"Welche Nationalmannschaft gilt als die stärkste Mannschaft der WM-Geschichte, die nie Weltmeister wurde?",options:["Niederlande","Ungarn","Jugoslawien","Portugal"],correct:0,explanation:"Die Niederlande erreichte drei WM-Finale (1974, 1978, 2010) und verlor alle drei – und gilt dennoch als eine der besten Teams ohne Weltmeisterschaft.",topic:"Geschichte"},
  {question:"Wer war der erste englische Nationalspieler, der in der Bundesliga spielte?",options:["Gary Lineker","Kevin Keegan","Steve McManaman","Tony Woodcock"],correct:1,explanation:"Kevin Keegan wechselte 1977 als erster bedeutender englischer Spieler in die Bundesliga zu Hamburger SV und wurde dort zweimal Europas Fußballer des Jahres.",topic:"Geschichte"},

  {question:"Wie viele WM-Titel hat Frankreich insgesamt gewonnen?",options:["1","2","3","4"],correct:1,explanation:"Frankreich gewann bisher zweimal die Weltmeisterschaft: 1998 im eigenen Land und 2018 in Russland.",topic:"Weltmeisterschaft"},
  {question:"Welcher Spieler gewann mit Brasilien die Weltmeisterschaft und hält den Rekord als einziger Fußballer mit drei WM-Titeln?",options:["Ronaldo Nazário","Cafu","Pelé","Ronaldinho"],correct:2,explanation:"Pelé ist der einzige Fußballer, der dreimal Weltmeister wurde: 1958, 1962 und 1970 mit Brasilien.",topic:"Rekorde"},
  {question:"Welches Land errang bei der WM 2010 in Südafrika den Bronzerang?",options:["Brasilien","Uruguay","Argentinien","Deutschland"],correct:3,explanation:"Deutschland gewann 2010 das Spiel um den dritten Platz gegen Uruguay mit 3:2 und belegte damit Rang drei.",topic:"Weltmeisterschaft"},
  {question:"Welcher Verein gewinnt seit Jahren die niederländische Meisterschaft am häufigsten?",options:["Feyenoord","Ajax Amsterdam","PSV Eindhoven","AZ Alkmaar"],correct:1,explanation:"Ajax Amsterdam ist der erfolgreichste Verein in der Eredivisie mit über 35 Meisterschaften.",topic:"Ligen"},
  {question:"Wie nennt man das System, bei dem alle Spieler außer dem Torhüter sowohl offensiv als auch defensiv agieren?",options:["Tiki-Taka","Total Football","Katenkick","Catenaccio"],correct:1,explanation:"'Total Football' bezeichnet eine Spielphilosophie, in der alle Spieler universell einsetzbar sind und flexibel die Positionen wechseln – geprägt durch Ajax der 1970er und die Niederlande.",topic:"Spielsysteme"},
  {question:"Welcher Spieler hält den Rekord für das schnellste Tor in der Bundesliga-Geschichte?",options:["Bojan Krkić","Karim Bellarabi","Marco Reus","Robert Lewandowski"],correct:1,explanation:"Karim Bellarabi erzielte am 23. August 2014 nach nur 9,1 Sekunden das schnellste Tor in der Bundesliga-Geschichte.",topic:"Rekorde"},
  {question:"Wer war der erste Spieler, der in drei verschiedenen WM-Turnieren Tore schoss?",options:["Miroslav Klose","Pelé","Uwe Seeler","Gerd Müller"],correct:2,explanation:"Uwe Seeler traf bei den Weltmeisterschaften 1958, 1962, 1966 und 1970 und war einer der ersten Spieler mit WM-Toren in so vielen Turnieren.",topic:"Geschichte"},
  {question:"Welche Nationalmannschaft schied bei der WM 2018 in der Vorrunde als amtierender Weltmeister aus?",options:["Brasilien","Spanien","Deutschland","Argentinien"],correct:2,explanation:"Deutschland schied 2018 als amtierender Weltmeister bereits in der Vorrunde aus – darunter eine historische 0:2-Niederlage gegen Südkorea.",topic:"Weltmeisterschaft"},
  {question:"In welchem Jahr gewann der FC Liverpool zum sechsten Mal die Champions League?",options:["2005","2012","2019","2022"],correct:2,explanation:"Liverpool gewann 2019 die Champions League durch einen 2:0-Sieg im Finale gegen Tottenham Hotspur.",topic:"Champions League"},
  {question:"Welcher Verein ist bekannt für das sogenannte 'Erbeben', wenn Fans auf der Tribüne springen?",options:["Celtic Glasgow","Galatasaray","Dortmund","Bokelberg"],correct:2,explanation:"Der Signal Iduna Park in Dortmund ist für seine 'Gelbe Wand' (Südtribüne) bekannt – wenn 25.000 Fans gleichzeitig springen, ist das Stadion spürbar.",topic:"Stadien"},
  {question:"Welcher Trainer wurde nach dem WM-Desaster 2018 bei der deutschen Nationalmannschaft abgelöst?",options:["Rudi Völler","Jürgen Klinsmann","Hansi Flick","Joachim Löw"],correct:3,explanation:"Joachim Löw blieb nach dem WM-Aus 2018 noch Bundestrainer, trat aber nach der EM 2021 zurück. Es gab keine sofortige Ablösung.",topic:"Trainer"},
  {question:"Wer war der erste Torjäger in der Geschichte der Champions League mit 5 Toren in einem einzigen Spiel?",options:["Cristiano Ronaldo","Lionel Messi","Luiz Adriano","Robert Lewandowski"],correct:2,explanation:"Luiz Adriano erzielte am 21. Oktober 2014 für Schachtjor Donezk fünf Tore gegen BATE Borisov – ein CL-Rekord in einem Einzelspiel.",topic:"Champions League"},
  {question:"Welcher Spieler gewann mit drei verschiedenen Vereinen die Champions League?",options:["Clarence Seedorf","Raúl","Ryan Giggs","Paolo Maldini"],correct:0,explanation:"Clarence Seedorf gewann die Champions League mit Ajax Amsterdam (1995), Real Madrid (1998) und AC Mailand (2003 und 2007) – als einziger Spieler mit drei verschiedenen Clubs.",topic:"Rekorde"},
  {question:"Wie nennt man einen Schuss, bei dem der Ball mit der Innenseite des Fußes gespielt wird?",options:["Dropkick","Volley","Innenrist","Spann"],correct:2,explanation:"Der Innenrist ist die kontrollierte Schuss- und Passtechnik mit der Innenseite des Fußes und gilt als präziseste Schussart.",topic:"Fachbegriffe"},
  {question:"Welche Mannschaft galt als erste europäische Nationalmannschaft, die eine WM gewann?",options:["England","Deutschland","Italien","Frankreich"],correct:2,explanation:"Italien gewann 1934 im eigenen Land als erstes europäisches Team die Weltmeisterschaft.",topic:"Geschichte"},

// INSTALLER-LOGIK
// ═══════════════════════════════════════════════════════
const CATALOGS_TO_INSTALL = [
  { id: 'cat_fussball_leicht', name: '⚽ Fußball – Leicht',  desc: 'Grundwissen Fußball (334 Fragen)', questions: LEICHT },
  { id: 'cat_fussball_mittel', name: '⚽ Fußball – Mittel',  desc: 'Fortgeschrittenes Fußballwissen (334 Fragen)', questions: MITTEL },
  { id: 'cat_fussball_schwer', name: '⚽ Fußball – Schwer',  desc: 'Experten- & Historikwissen (334 Fragen)', questions: SCHWER },
];

function getCatalogs() {
  try { return JSON.parse(localStorage.getItem('sd_catalogs') || '[]'); } catch { return []; }
}
function saveCatalogs(arr) { localStorage.setItem('sd_catalogs', JSON.stringify(arr)); }

function install() {
  const statsEl = document.getElementById('stats');
  const statusEl = document.getElementById('status');
  try {
    statsEl.innerHTML = CATALOGS_TO_INSTALL.map(c =>
      '<div class="stat"><span>' + c.name + '</span><span class="v">' + c.questions.length + ' Fragen</span></div>'
    ).join('') +
    '<div class="stat"><span><strong>Gesamt</strong></span><span class="v">' +
      CATALOGS_TO_INSTALL.reduce((s, c) => s + c.questions.length, 0) + ' Fragen</span></div>';

    let cats = getCatalogs();
    // Bestehende Fußball-Kataloge ersetzen (idempotent), andere behalten
    const ids = CATALOGS_TO_INSTALL.map(c => c.id);
    cats = cats.filter(c => !ids.includes(c.id));
    CATALOGS_TO_INSTALL.forEach(c => cats.push(c));
    saveCatalogs(cats);

    statusEl.className = 'status ok';
    statusEl.textContent = '✓ Installiert! Die 3 Fußball-Kataloge sind jetzt in School Duel verfügbar (unter „📚 Kataloge").';
  } catch (e) {
    statusEl.className = 'status err';
    statusEl.textContent = '✗ Fehler: ' + e.message;
  }
}

install();
</script>
