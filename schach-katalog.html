  {question:"Wie nennt man künstlich erstellte Aufgaben wie 'Matt in 2 Zügen'?",options:["Schachprobleme (Kompositionen)","Blitzpartien","Eröffnungsfallen","Simultanpartien"],correct:0,explanation:"Schachprobleme bzw. -kompositionen sind eigens komponierte Aufgaben mit einer eindeutigen Lösung.",topic:"Komposition"},
  {question:"In der 'Vergifteter-Bauer-Variante' der Najdorf-Sizilianisch schlägt Schwarz mit der Dame welchen Bauern?",options:["Den Bauern auf b2","Den Bauern auf e4","Den Bauern auf h2","Den Bauern auf a2"],correct:0,explanation:"Schwarz greift mit ...Db6 und ...Dxb2 den 'vergifteten' b2-Bauern – eine extrem scharfe, theorielastige Linie.",topic:"Eröffnung"},
  {question:"Ist man verpflichtet, einen möglichen En-passant-Schlag auszuführen?",options:["Ja, immer","Nein, er ist freiwillig","Nur wenn man im Schach steht","Nur mit dem Randbauern"],correct:1,explanation:"En passant ist – wie jedes Schlagen im Schach – freiwillig, aber nur sofort möglich.",topic:"Regeln"},
  {question:"Wie nennt man die Umwandlung eines Bauern in eine schwächere Figur als die Dame?",options:["Fehlumwandlung","Unterverwandlung","Rückumwandlung","Minus-Promotion"],correct:1,explanation:"Eine Unterverwandlung (z.B. in einen Springer) kann taktisch besser sein als die Dame.",topic:"Regeln"},
  {question:"Warum verwandelt man einen Bauern gelegentlich in einen Springer statt in eine Dame?",options:["Aus Höflichkeit","Weil der Springer eine Möglichkeit (z.B. eine Gabel oder ein Schach) bietet, die die Dame nicht hat","Das ist verboten","Um ein Remis zu erzwingen"],correct:1,explanation:"Manchmal entscheidet ein Springer per Gabel oder Schach die Partie, wo eine Dame nur Patt oder nichts brächte.",topic:"Regeln"},
  {question:"Was sind 'Endspieldatenbanken' (Tablebases)?",options:["Eröffnungsbücher","Datenbanken mit perfekt berechneten Endspielen weniger Figuren","Spieler-Ranglisten","Sammlungen kompletter Partien"],correct:1,explanation:"Tablebases enthalten die perfekt ausgerechnete Bewertung aller Stellungen mit wenigen Steinen.",topic:"Computer"},
  {question:"In welcher Partiephase ist Zugzwang am häufigsten ein entscheidender Faktor?",options:["In der Eröffnung","Im Mittelspiel","Im Endspiel","Direkt nach dem Anstoß"],correct:2,explanation:"Im Endspiel mit wenig Material zwingt der Zugzwang den Gegner oft zu verlustreichen Zügen.",topic:"Endspiel"},
  {question:"Welcher Spieler besiegte Anatoli Karpow 1985 und bestätigte den WM-Titel 1986 im Revanchekampf?",options:["Wladimir Kramnik","Garri Kasparow","Viswanathan Anand","Nigel Short"],correct:1,explanation:"Kasparow gewann 1985 in Moskau den 24. Strich-Zug und wurde mit 22 Jahren Weltmeister; 1986 bestätigte er den Titel.",topic:"Geschichte"},
  {question:"Welches WM-Match 2006 wurde durch einen 'Toiletten-Skandal' überschattet?",options:["Kasparow–Karpow 1985","Kramnik–Topalov 2006","Carlsen–Anand 2013","Fischer–Spasski 1972"],correct:1,explanation:"Im WM-Kampf Kramnik–Topalov warf das Topalov-Lager Kramnik vor, die Toilettenpausen taktisch zu missbrauchen; Kramnik gewann dennoch.",topic:"Geschichte"},
  {question:"Wer wurde 2023 Schachweltmeister?",options:["Magnus Carlsen","Fabiano Caruana","Ding Liren","Ian Nepomniachtchi"],correct:2,explanation:"Ding Liren gewann 2023 das WM-Match gegen Ian Nepomniachtchi (Tiebreak) und wurde der erste chinesische Weltmeister.",topic:"Geschichte"},
  {question:"Warum verzichtete Magnus Carlsen 2023 auf die Titelverteidigung?",options:["Wegen einer Verletzung","Er war nicht motiviert, den Titel nach dem klassischen WM-Format zu verteidigen","Er wurde disqualifiziert","Er verlor einen Qualifikationskampf"],correct:1,explanation:"Carlsen erklärte öffentlich, er sei nicht ausreichend motiviert für ein klassisches WM-Match und trat freiwillig zurück.",topic:"Geschichte"},
  {question:"Welcher sowjetische Spieler besiegte 1960 Michail Botwinnik durch spektakuläres Opferspiel?",options:["Tigran Petrosjan","Boris Spasski","Michail Tal","Wassili Smyslow"],correct:2,explanation:"Michail Tal besiegte 1960 Botwinnik mit wilden Kombinationen; Botwinnik gewann den Titel 1961 im Revanchekampf zurück.",topic:"Geschichte"},
  {question:"Wie heißt Kasparows berühmte Kombinations-Partie 1999 gegen Veselin Topalov?",options:["Die Unsterbliche Partie","Kasparows Unsterbliche (Linares 1999)","Die Partie des Jahrhunderts","Die Immergrüne Partie"],correct:1,explanation:"In Linares 1999 opferte Kasparow gegen Topalov auf spektakuläre Weise – eine der am meisten analysierten Partien der Moderne.",topic:"Berühmte Partien"},
  {question:"Wie heißt die berühmte Partie, die Paul Morphy 1858 im Pariser Opernhaus spielte?",options:["Die Unsterbliche Partie","Die Opernpartie","Die Partie des Jahrhunderts","Die Immergrüne Partie"],correct:1,explanation:"In der 'Opernpartie' demonstrierte Morphy perfekte Entwicklungs- und Kombinationsprinzipien gegen den Herzog von Braunschweig.",topic:"Berühmte Partien"},
  {question:"Welche Partie aus dem WM-Match Fischer–Spasski 1972 gilt als eine der schönsten aller Zeiten?",options:["Partie 1","Partie 3","Partie 6","Partie 12"],correct:2,explanation:"Partie 6 in Reykjavík 1972 gilt als Meisterwerk: Fischer gewann eine tief strategische Partie – von Experten als beste Turnierpartie aller Zeiten gewertet.",topic:"Berühmte Partien"},
  {question:"Was ist das 'Erstickungsmatt' (Smothered Mate)?",options:["Matt durch einen Turm auf der Grundreihe","Matt durch einen Springer, wobei der König von eigenen Figuren eingeschlossen ist","Matt durch zwei Läufer","Matt durch einen Bauern"],correct:1,explanation:"Beim Erstickungsmatt gibt der König keine Fluchtfelder, weil ihn eigene Figuren einschließen; der Springer setzt das entscheidende Matt.",topic:"Taktik"},
  {question:"Was ist das 'Arabische Matt'?",options:["Matt mit Dame und Springer in der Ecke","Matt mit Turm und Springer: der Turm deckt die Fluchtreihe, der Springer setzt Matt in der Ecke","Matt mit zwei Springern","Matt mit Läufer und Springer"],correct:1,explanation:"Beim Arabischen Matt kooperieren Turm und Springer: der Turm blockiert die Fluchtreihe, der Springer deckt verbleibende Felder und setzt Matt.",topic:"Taktik"},
  {question:"Welche Schachschule vertrat die These, das Zentrum mit Figuren zu kontrollieren statt mit Bauern zu besetzen?",options:["Die klassische Steinitz-Schule","Die Hypermoderne (Nimzowitsch, Réti, Tartakower)","Die sowjetische Schule","Die romantische Schule"],correct:1,explanation:"Die hypermoderne Schule (1920er) setzte auf Figurenangriff auf ein gegnerisches Bauernzentrum von den Flanken.",topic:"Theorie"},
  {question:"Wer schrieb 'Mein System' (1925), eines der einflussreichsten Schachbücher des 20. Jahrhunderts?",options:["Garri Kasparow","Aaron Nimzowitsch","Wilhelm Steinitz","José Capablanca"],correct:1,explanation:"Aaron Nimzowitsch definierte in 'Mein System' Konzepte wie Überdeckung, Prophylaxe und Blockade – Grundlagen moderner Schachtheorie.",topic:"Theorie"},
  {question:"Was ist 'Prophylaxe' im Schach?",options:["Ein Gambit in der Eröffnung","Vorbeugende Züge, die gegnerische Pläne im Keim ersticken","Eine Remisstrategie","Ein spezielles Mattbild"],correct:1,explanation:"Prophylaxe ist das vorausschauende Verhindern gegnerischer Aktionen – ein Markenzeichen von Tigran Petrosjan und Anatoli Karpow.",topic:"Theorie"},
  {question:"Welche Eröffnung entsteht nach 1.d4 Sf6 2.c4 e6 3.Sf3 b6 (Damen-Indische Verteidigung)?",options:["Nimzo-Indisch","Damen-Indisch","Grünfeld","Königsindisch"],correct:1,explanation:"Die Damen-Indische Verteidigung (3...b6) mit dem Fianchetto des Damenläufers gilt als solide und flexible Antwort auf 1.d4.",topic:"Eröffnung"},
  {question:"Was ist das 'Budapester Gambit' (1.d4 Sf6 2.c4 e5)?",options:["Eine solide Verteidigung gegen 1.d4","Schwarz gibt sofort einen Bauern für aktives Figurenspiel und Initiative","Eine Eröffnung für Weiß","Eine geschlossene Eröffnung"],correct:1,explanation:"Im Budapester Gambit opfert Schwarz den e-Bauern für schnelle Figuren-Aktivität – eine aggressive Antwort auf 1.d4.",topic:"Eröffnung"},
  {question:"Was ist die 'Russische Partie' (Petroff-Verteidigung, 1.e4 e5 2.Sf3 Sf6)?",options:["Spanisch","Italienisch","Eine solide, remisneigung Verteidigung mit Sf6-Gegenzug","Philidor"],correct:2,explanation:"Die Russische Partie (Petroff) ist bekannt für ihre Solidität und häufige Remistendenz – populär bei Spielern, die auf sicheres Spiel setzen.",topic:"Eröffnung"},
  {question:"Was ist das 'Katalanische System' (1.d4 d5 2.c4 e6 3.g3)?",options:["Damengambit-Struktur kombiniert mit Fianchetto des Königsläufers","1.e4 c6","1.d4 Sf6 2.Sf3","1.c4 e5"],correct:0,explanation:"Im Katalanischen System entwickelt Weiß den Läufer nach g2 und übt dauerhaften Diagonaldruck auf d5 aus.",topic:"Eröffnung"},
  {question:"Was ist die 'Saavedra-Position'?",options:["Eine wichtige Remisstellung im Turmendspiel","Eine Studie mit Dame gegen Turm, bei der die Unterverwandlung in einen Turm den Sieg erzwingt","Ein Mattzug mit zwei Türmen","Eine Eröffnungsfalle"],correct:1,explanation:"In der Saavedra-Position (1895) verwandelt der Bauer nicht in eine Dame (Pattgefahr!), sondern in einen Turm – um einer Gabel zu entgehen und zu gewinnen.",topic:"Endspiel"},
  {question:"Was ist die 'Berühren-Ziehen-Regel' (J'adoube-Regel)?",options:["Man muss immer den König bewegen","Wer eine eigene Figur absichtlich berührt, muss sie ziehen; wer eine gegnerische berührt, muss sie schlagen (wenn möglich)","Man darf nur eine Figur pro Zug anfassen","Berühren ist ohne Ansage verboten"],correct:1,explanation:"'J'adoube' (= ich korrigiere) kündigt bloßes Rücken einer Figur an; sonst gilt: berühren = ziehen bzw. schlagen.",topic:"Regeln"},
  {question:"Was passiert, wenn einem Spieler die Bedenkzeit abläuft?",options:["Die Partie gilt als Remis","Er verliert die Partie – sofern der Gegner mit dem verbleibenden Material noch mattsetzen kann","Er bekommt eine Zeitstrafe","Er darf mit mehr Zeit weiterspielen"],correct:1,explanation:"Zeitüberschreitung bedeutet Niederlage – außer wenn der Gegner nachweislich kein ausreichendes Material für ein erzwungenes Matt hat.",topic:"Regeln"},
  {question:"Was ist das 'Linares-Turnier'?",options:["Ein Online-Schach-Event","Ein legendäres spanisches Einladungsturnier, das als 'Wimbledon des Schachs' galt","Ein Juniorenturnier","Ein Mannschafts-Wettkampf"],correct:1,explanation:"Das Turnier in Linares (Spanien) galt jahrzehntelang als das stärkste Einladungsturnier der Welt.",topic:"Geschichte"},
  {question:"Wie heißt das traditionsreichste niederländische Einladungsturnier?",options:["Tata Steel Chess (Wijk aan Zee)","Linares","Dortmund","Biel"],correct:0,explanation:"Das Tata Steel Chess Tournament (früher Corus, Hoogovens) in Wijk aan Zee ist eines der ältesten und angesehensten Einladungsturniere.",topic:"Geschichte"},
  {question:"Wofür steht die Abkürzung 'IM' im Schach?",options:["Internationaler Meister","Interner Meister","Internet-Meister","Indischer Meister"],correct:0,explanation:"'IM' steht für 'Internationaler Meister' – der zweithöchste FIDE-Titel nach dem Großmeister (GM).",topic:"Begriffe"},
  {question:"Was ist das 'Giuoco Piano' (Ruhiges Spiel)?",options:["Eine Variante der Spanischen Partie","Eine ruhige Variante der Italienischen Partie mit Lc4–Lc5","Eine Variante des Damengambits","Eine Verteidigung gegen 1.d4"],correct:1,explanation:"Das Giuoco Piano entsteht nach Lc4 Lc5 und führt zu ausgeglichenem, positionellem Spiel – im Gegensatz zu scharfen Systemen.",topic:"Eröffnung"},
  {question:"Was ist das 'Zweispringer-Spiel' (1.e4 e5 2.Sf3 Sc6 3.Lc4 Sf6)?",options:["Eine Variante der Spanischen Partie","Eine Variante der Italienischen Partie, in der Schwarz sofort mit Sf6 den e4-Bauern angreift","Eine geschlossene Eröffnung","Eine Variante des Damengambits"],correct:1,explanation:"Im Zweispringer-Spiel greift Schwarz mit 3...Sf6 sofort an – führt zu scharfen Varianten wie dem Fried-Liver-Angriff.",topic:"Eröffnung"},
  {question:"Was ist die 'Moderne Benoni-Verteidigung' (1.d4 Sf6 2.c4 c5 3.d5 e6)?",options:["Eine solide Abriegelungsstrategie","Eine dynamische Verteidigung mit ungleichgewichtigem Bauernaufbau und schwarzem Gegenspiel","Eine Eröffnung für Weiß","Eine geschlossene Eröffnung"],correct:1,explanation:"In der Modernen Benoni entsteht d5 vs ...e6: Weiß drückt am Damenflügel, Schwarz sucht Gegenspiel am Königsflügel.",topic:"Eröffnung"},
  {question:"Für welches berühmte Bauernopfer in der Spanischen Partie ist Frank Marshall bekannt?",options:["Den Marshall-Angriff (Schwarzer Bauernopfer auf e5 für schnellen Königsangriff)","Den Sizilianischen Angriff","Das Damengambit","Das Königsgambit"],correct:0,explanation:"Frank Marshall entwickelte den Marshall-Angriff und spielte ihn erstmals 1918 gegen Capablanca – eine der kühnsten Eröffnungsideen.",topic:"Geschichte"},
  {question:"Welches Konzept vertritt Richard Réti in seiner Eröffnung (1.Sf3 d5 2.c4)?",options:["Frühes Bauernzentrum erzwingen","Kontrolle des Zentrums von den Flanken mit Figuren und Fianchettos","Früher Königsangriff","Doppelgambit"],correct:1,explanation:"Réti kontrolliert das Zentrum hypermodern von den Flanken, statt es mit Bauern zu besetzen.",topic:"Eröffnung"},
  {question:"Was ist 'Überdeckung' (Overprotection) nach Aaron Nimzowitsch?",options:["Immer die Dame früh entwickeln","Strategisch wichtige Punkte stärker decken als unmittelbar nötig, um zukünftigen Angriffen vorzubeugen","Sofort rochieren","Alle Bauern ins Zentrum schieben"],correct:1,explanation:"Überdeckung bedeutet, einen wichtigen Punkt mehr zu sichern als scheinbar nötig – so bleibt man vor Überraschungen gefeit.",topic:"Theorie"},
  {question:"Welche Eröffnung entsteht nach 1.e4 Sf6 (Aljechin-Verteidigung)?",options:["Pirc","Aljechin-Verteidigung","Skandinavisch","Caro-Kann"],correct:1,explanation:"Aljechin lockt den weißen Bauern ins Zentrum, um ihn später mit Figuren anzugreifen – ein provokanter hypermoderner Ansatz.",topic:"Eröffnung"},
  {question:"Was ist der 'Fried-Liver-Angriff' (Heißes Eisen) im Zweispringer-Spiel?",options:["Ein Angriff im Damengambit","Ein scharfer Springeropfer-Angriff mit 5.Sxf7, der den schwarzen König in die Mitte zieht","Ein Bauernopfer in der Spanischen Partie","Ein Zug im Königsgambit"],correct:1,explanation:"Im Fried-Liver-Angriff opfert Weiß mit 5.Sxf7 einen Springer, um den schwarzen König frühzeitig in die Mitte zu locken.",topic:"Eröffnung"},
  {question:"Was bedeutet es, ein 'Tempo zu gewinnen'?",options:["Schneller spielen","Durch eine Drohung einen freien Entwicklungszug gewinnen","Mehr Bedenkzeit erhalten","Eine Figur opfern"],correct:1,explanation:"Ein Tempo gewinnen heißt: durch eine Drohung (z.B. Schach) zwingt man den Gegner zu reagieren und kann selbst einen Entwicklungszug machen.",topic:"Strategie"},
  {question:"Welche Grundregel zur Turmstellung formulierte Siegbert Tarrasch?",options:["Philidor-Regel","Türme gehören hinter Freibauern – eigene wie gegnerische","Lucena-Regel","Réti-Regel"],correct:1,explanation:"Tarrasch stellte fest: Türme hinter Freibauern stehen – eigene können ihn schieben, gegnerische bremsen ihn.",topic:"Endspiel"},
  {question:"Was ist ein 'schlechter Läufer'?",options:["Ein Läufer mit wenigen Diagonalen","Ein Läufer, der durch eigene Bauern auf denselben Feldern seiner Farbe blockiert ist","Ein Läufer, der nicht rochieren darf","Ein Läufer ohne Angriffsziel"],correct:1,explanation:"Ein 'schlechter Läufer' steht auf derselben Feldfarbe wie die eigenen Bauern – diese blockieren seine Diagonalen.",topic:"Strategie"},
  {question:"Was ist der Unterschied zwischen 'taktischem' und 'positionellem' Schach?",options:["Es gibt keinen Unterschied","Taktik: konkrete Zugfolgen mit sofortigem Ziel (Material, Matt); Positionell: langfristige Strukturplanung ohne direkte Drohungen","Positionell bedeutet immer Remisstreben","Taktisch bedeutet immer opfern"],correct:1,explanation:"Taktik bezeichnet kurze, konkrete Zugfolgen; positionelles Spiel plant langfristig auf strukturelle Vorteile (Bauernstruktur, Feldkontrolle).",topic:"Theorie"},
  {question:"Wer ist laut FIDE-Eintrag der bislang jüngste Großmeister (Stand 2024)?",options:["Magnus Carlsen","Sergej Karjakin (12 J. 7 M.)","Abhimanyu Mishra (12 J. 4 M., 2021)","Teimur Radjabov"],correct:2,explanation:"Abhimanyu Mishra erzielte 2021 mit 12 Jahren und 4 Monaten den GM-Titel und überbot damit Karjakins bisherigen Rekord.",topic:"Geschichte"},
  {question:"Was ist das 'Damengambit Angenommen' (1.d4 d5 2.c4 dxc4)?",options:["Damengambit Abgelehnt","Schwarz nimmt den c4-Bauern und muss ihn später zurückgeben","Slawische Verteidigung","Katalanisch"],correct:1,explanation:"Im Damengambit Angenommen (DGA) greift Schwarz den c4-Bauern; Weiß gewinnt Zentrumsraum, Schwarz spielt auf Gegenspiel.",topic:"Eröffnung"},
  {question:"Wer war François-André Danican Philidor, und womit prägte er die Schachgeschichte?",options:["Ein moderner Großmeister","Ein französischer Spieler des 18. Jh., der die strategische Bedeutung der Bauern lehrte ('Bauern sind die Seele des Schachs')","Ein Schachcomputer-Pionier","Der erste FIDE-Präsident"],correct:1,explanation:"Philidor (1726–1795) war der stärkste Spieler seiner Epoche und schrieb 'Analyse des Schachspiels' – er betonte systematische Bauernbehandlung.",topic:"Geschichte"},
  {question:"Warum heißt die 'Drachenvariante' der Sizilianischen Verteidigung so?",options:["Wegen eines Drachen-Mattbildes","Die Bauernstruktur von Schwarz (g6, d6, c5, e5) ähnelt dem Sternbild Draco","Sie wurde von einem Spieler namens Dragon erfunden","Wegen ihrer aggressiven Opferstrategie"],correct:1,explanation:"Die Bauernstruktur in der Drachenvariante erinnert an das Sternbild Draco; der fianchettierte Läufer auf g7 gilt als 'der Drache'.",topic:"Eröffnung"},
  {question:"Was war die Rolle der sowjetischen Schachschule im 20. Jahrhundert?",options:["Sie war bedeutungslos für die Schachwelt","Die UdSSR dominierte von 1948 bis 1972 und ab 1975 wieder die Weltmeisterschaften; staatlich gefördertes Schach auf höchstem Niveau","Nur ein Spieler war aus der UdSSR","Die UdSSR boykottierte die FIDE"],correct:1,explanation:"Die sowjetische Schachschule (Botwinnik, Tal, Petrosjan, Spasski, Karpow, Kasparow) dominierte die Schachgeschichte über Jahrzehnte.",topic:"Geschichte"}
];

// ═══════════════════════════════════════════════════════
const CATALOGS_TO_INSTALL = [
  { id: 'cat_schach_leicht', name: '♟️ Schach – Leicht', desc: 'Grundwissen Schach: Brett, Figuren & Regeln', questions: LEICHT },
  { id: 'cat_schach_mittel', name: '♟️ Schach – Mittel', desc: 'Eröffnungen, Taktik, Notation & Geschichte', questions: MITTEL },
  { id: 'cat_schach_schwer', name: '♟️ Schach – Schwer', desc: 'Weltmeister, Theorie & berühmte Partien', questions: SCHWER },
].filter(c => c.questions.length > 0);

function getCatalogs() {
  try { return JSON.parse(localStorage.getItem('sd_catalogs') || '[]'); } catch { return []; }
}
function saveCatalogs(arr) { localStorage.setItem('sd_catalogs', JSON.stringify(arr)); }

function install() {
  const statsEl = document.getElementById('stats');
  const statusEl = document.getElementById('status');
  try {
    statsEl.innerHTML = CATALOGS_TO_INSTALL.map(c =>
      '<div class="stat"><span>' + c.name + '</span><span class="v">' + c.questions.length + ' Fragen</span></div>'
    ).join('') +
    '<div class="stat"><span><strong>Gesamt</strong></span><span class="v">' +
      CATALOGS_TO_INSTALL.reduce((s, c) => s + c.questions.length, 0) + ' Fragen</span></div>';

    let cats = getCatalogs();
    // Bestehende Schach-Kataloge ersetzen (idempotent), andere behalten
    const ids = CATALOGS_TO_INSTALL.map(c => c.id);
    cats = cats.filter(c => !ids.includes(c.id));
    CATALOGS_TO_INSTALL.forEach(c => cats.push(c));
    saveCatalogs(cats);

    statusEl.className = 'status ok';
    statusEl.textContent = '✓ Installiert! Die Schach-Kataloge sind jetzt in School Duel verfügbar (unter „📚 Kataloge").';
  } catch (e) {
    statusEl.className = 'status err';
    statusEl.textContent = '✗ Fehler: ' + e.message;
  }
}

install();
</script>
